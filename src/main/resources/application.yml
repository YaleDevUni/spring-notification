spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/notification
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

notification:
  worker:
    pool-size: 10
    batch-size: 10
    poll-interval-seconds: 5
  retry:
    max-attempts: 3
    manual-max-attempts: 2
  lock:
    expire-seconds: 60
