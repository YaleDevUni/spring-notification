spring:
  profiles:
    active: db  # DbPollingConsumer 활성화. kafka로 변경 시 MQ 전환
  datasource:
    url: jdbc:postgresql://localhost:5433/notification
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false  # OSIV 비활성화 — 트랜잭션 밖 LAZY 로딩 금지, DTO로 응답하므로 안전
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

notification:
  worker:
    pool-size: 10
    batch-size: 10
    poll-interval-seconds: 5
  retry:
    max-attempts: 3
    manual-max-attempts: 2
  lock:
    expire-seconds: 60
